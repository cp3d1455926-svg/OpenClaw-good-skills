<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 心理小测试 - 探索内心世界</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --accent: #e94560;
            --accent-soft: rgba(233, 69, 96, 0.2);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        #app {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* 标题 */
        #header {
            text-align: center;
            margin-bottom: 40px;
        }

        #header h1 {
            font-size: 2.5rem;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        #header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* 测试选择菜单 */
        #test-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .test-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .test-card:nth-child(2)::before { background: var(--gradient-2); }
        .test-card:nth-child(3)::before { background: var(--gradient-3); }
        .test-card:nth-child(4)::before { background: var(--gradient-4); }
        .test-card:nth-child(5)::before { background: var(--gradient-5); }

        .test-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(233, 69, 96, 0.2);
        }

        .test-card:hover::before {
            transform: scaleX(1);
        }

        .test-card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .test-card .title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .test-card .desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 测试内容区域 */
        #test-area {
            display: none;
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        #test-area.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .test-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .test-header p {
            color: var(--text-secondary);
        }

        /* 问题显示 */
        #question-container {
            margin-bottom: 30px;
        }

        .question-number {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 答案选项 */
        #options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 18px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateX(5px);
        }

        .option-btn .option-letter {
            width: 32px;
            height: 32px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* 色彩测试特殊样式 */
        .color-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .color-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .color-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .color-btn::after {
            content: attr(data-name);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* 进度条 */
        #progress-container {
            margin-top: 30px;
        }

        #progress-bar {
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--gradient-2);
            transition: width 0.5s ease;
            width: 0%;
        }

        #progress-text {
            text-align: center;
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 结果页面 */
        #result-area {
            display: none;
            text-align: center;
        }

        #result-area.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-type {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .result-desc {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            text-align: left;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .back-btn {
            background: var(--gradient-1);
            border: none;
            color: #fff;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* 分享按钮 */
        .share-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .share-btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            #header h1 { font-size: 1.8rem; }
            #test-area { padding: 25px; }
            .color-options { grid-template-columns: repeat(3, 1fr); }
            .result-stats { grid-template-columns: 1fr; }
        }

        /* 弹跳动画 */
        .option-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div id="app">
        <!-- 标题 -->
        <div id="header">
            <h1>🧩 心理小测试</h1>
            <p>探索内心世界，发现真实的自己</p>

        <!-- 测试选择菜单 -->
        <div id="test-menu">
            <div class="test-card" data-test="color">
                <span class="icon">🎨</span>

            </div>
            <div class="test-card" data-test="heart">
                <span class="icon">💭</span>
                <div class="title">心灵深处</div>
                <div class="desc">凭直觉选择场景，解读你的内心世界</div>
            </div>
            <div class="test-card" data-test="love">
                <span class="icon">💕</span>
                <div class="title">爱情观测试</div>
                <div class="desc">探索你的恋爱性格和理想伴侣</div>
            </div>
            <div class="test-card" data-test="stress">
                <span class="icon">😰</span>
                <div class="title">压力指数</div>
                <div class="desc">评估你目前的压力水平和应对方式</div>
            </div>
            <div class="test-card" data-test="persona">
                <span class="icon">🎭</span>
                <div class="title">人格类型</div>
                <div class="desc">你是哪种性格类型？测一测就知道</div>
            </div>
        </div>

        <!-- 测试区域 -->
        <div id="test-area">
            <div class="test-header">
                <h2 id="test-title">🎨 色彩心理学</h2>
                <p id="test-desc">选择你喜欢的颜色，发现隐藏的性格</p>
            </div>
            
            <div id="question-container">
                <span class="question-number" id="question-num">问题 1/1</span>
                <div class="question-text" id="question-text">请凭直觉选择你最喜欢的颜色</div>
                <div id="options-container"></div>
            </div>

            <div id="progress-container">
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="progress-text">1 / 1</div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div id="result-area">
            <div class="result-icon" id="result-icon">🎉</div>
            <h2 class="result-title" id="result-title">测试完成！</h2>
            <div class="result-type" id="result-type">你是 XX 型</div>
            <div class="result-desc" id="result-desc"></div>
            <div class="result-stats" id="result-stats"></div>
            <button class="back-btn" onclick="backToMenu()">返回首页</button>
            <div style="margin-top: 20px;">
                <button class="share-btn" onclick="shareResult('wechat')">💬 分享给朋友</button>
                <button class="share-btn" onclick="copyResult()">📋 复制结果</button>
            </div>
        </div>
    </div>

    <script>
        // 测试题库
        const TESTS = {

                icon: '🎨',
                singleQuestion: true,

                    { name: '热情红', color: '#e74c3c', result: '热情奔放型', desc: '你是一个充满活力的人！红色代表热情、力量和冒险精神。你喜欢成为焦点，敢于追求自己想要的东西。你的执行力很强，但有时可能过于冲动。' },
                    { name: '阳光橙', color: '#e67e22', result: '乐观积极型', desc: '你是一个温暖的人！橙色象征着乐观、创造力和社交能力。你善于交际，喜欢帮助他人，总是能看到事物积极的一面。' },
                    { name: '快乐黄', color: '#f1c40f', result: '阳光活力型', desc: '你是人群中的小太阳！黄色代表快乐、希望和创造力。你思维活跃，喜欢新鲜事物，但有时可能缺乏耐心。' },

            heart: {

                        text: '你更倾向于？',
                        options: [
                            { text: '想象力和创意', score: 1 },
                            { text: '逻辑和分析', score: 2 },
                            { text: '情感和感受', score: 3 },
                            { text: '原则和规则', score: 4 }
                        ]
                    },
                    {
                        text: '做决定时，你更看重？',
                        options: [
                            { text: '长远影响', score: 1 },
                            { text: '事实和数据', score: 2 },
                            { text: '他人感受', score: 3 },
                            { text: '利弊分析', score: 4 }
                        ]
                    },
                    {
                        text: '你更喜欢？',
                        options: [
                            { text: '随机应变', score: 1 },
                            { text: '按计划行事', score: 2 },
                            { text: '随遇而安', score: 3 },
                            { text: '灵活调整', score: 4 }
                        ]
                    },
                    {
                        text: '当你遇到问题时？',
                        options: [
                            { text: '寻求新解决方案', score: 1 },
                            { text: '分析问题根源', score: 2 },
                            { text: '倾诉情感', score: 3 },
                            { text: '制定行动计划', score: 4 }
                        ]
                    }
                ]
            }
        };

        // 当前状态
        let currentTest = null;
        let currentQuestion = 0;
        let scores = [];

        // 开始测试
        function startTest(testId) {
            currentTest = testId;
            currentQuestion = 0;
            scores = [];

            const test = TESTS[testId];
            document.getElementById('test-menu').style.display = 'none';
            document.getElementById('result-area').classList.remove('active');
            document.getElementById('test-area').classList.add('active');
            document.getElementById('test-title').textContent = test.title;
            document.getElementById('test-desc').textContent = test.desc;

            showQuestion();
        }

        // 显示问题
        function showQuestion() {
            const test = TESTS[currentTest];
            
            // 色彩测试特殊处理
            if (test.singleQuestion) {
                showColorTest();
                return;
            }

            const question = test.questions[currentQuestion];
            document.getElementById('question-num').textContent = `问题 ${currentQuestion + 1}/${test.questions.length}`;
            document.getElementById('question-text').textContent = question.text;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + index)}</span>${option.text}`;
                btn.onclick = () => selectOption(option.score);
                optionsContainer.appendChild(btn);
            });

            updateProgress();
        }

        // 色彩测试
        function showColorTest() {
            const test = TESTS[currentTest];
            document.getElementById('question-num').textContent = '请选择';
            document.getElementById('question-text').textContent = '请凭直觉选择你最喜欢的颜色';
            document.getElementById('progress-container').style.display = 'none';

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '<div class="color-options"></div>';
            
            const colorContainer = optionsContainer.querySelector('.color-options');
            test.colors.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = c.color;
                btn.setAttribute('data-name', c.name);
                btn.onclick = () => showColorResult(c);
                colorContainer.appendChild(btn);
            });
        }

        // 选择答案
        function selectOption(score) {
            scores.push(score);
            currentQuestion++;

            const test = TESTS[currentTest];
            if (currentQuestion < test.questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 显示色彩测试结果
        function showColorResult(color) {
            document.getElementById('test-area').classList.remove('active');
            document.getElementById('result-area').classList.add('active');

            document.getElementById('result-icon').textContent = '🎨';
            document.getElementById('result-title').textContent = color.name;
            document.getElementById('result-type').textContent = color.result;
            document.getElementById('result-desc').textContent = color.desc;
            document.getElementById('result-stats').innerHTML = '';
        }

        // 显示结果
        function showResult() {
            const test = TESTS[currentTest];
            const totalScore = scores.reduce((a, b) => a + b, 0);
            const avgScore = totalScore / scores.length;

            // 计算结果 - 直接使用 currentTest 作为 ID
            let result = getResult(currentTest, avgScore);

            document.getElementById('test-area').classList.remove('active');
            document.getElementById('result-area').classList.add('active');

            document.getElementById('result-icon').textContent = test.icon;
            document.getElementById('result-title').textContent = '测试完成！';
            document.getElementById('result-type').textContent = result.type;
            document.getElementById('result-desc').textContent = result.desc;

            // 显示统计
            let statsHtml = `
                <div class="stat-item">
                    <div class="stat-value">${scores.length}</div>
                    <div class="stat-label">回答题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${totalScore}</div>
                    <div class="stat-label">总分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${avgScore.toFixed(1)}</div>
                    <div class="stat-label">平均分</div>
                </div>
            `;
            document.getElementById('result-stats').innerHTML = statsHtml;
        }

        // 获取结果
        function getResult(testId, avgScore) {
            const results = {
                heart: [
                    { type: '🌟 梦幻浪漫型', desc: '你是一个充满想象力的人，内心世界丰富多彩。你喜欢美好的事物，对生活有自己的期待和向往。你善于幻想，有时会沉浸在自己的世界里。' },
                    { type: '🏠 务实稳健型', desc: '你是一个脚踏实地的人，注重实际。你善于观察和分析，做事稳重可靠。你追求稳定的生活，但也不排斥适度的改变。' },
                    { type: '🚀 冒险进取型', desc: '你是一个勇于探索的人，喜欢挑战和新鲜事物。你不甘于平淡，总是想尝试新的可能性。你的行动力很强，想到就会去做。' },
                    { type: '🍀 随和自然型', desc: '你是一个心态平和的人，懂得随遇而安。你不喜欢争斗，善于适应环境。你追求简单快乐的生活，内心宁静。' }
                ],
                love: [
                    { type: '🔥 热烈奔放型', desc: '在爱情中你是一个主动的人，敢于追求自己的幸福。你相信一见钟情，愿意为爱付出一切。你的热情有时会让对方感到压力。' },
                    { type: '💝 细腻温柔型', desc: '你注重爱情的细节和质感，会为伴侣制造惊喜。你善于表达感情，恋爱中温柔体贴。你需要伴侣给你足够的关注。' },
                    { type: '🤝 理智稳健型', desc: '你对待爱情很理性，会仔细考虑对方的条件和未来。你不会轻易投入一段感情，但一旦认定就会很专一。' },
                    { type: '🌿 独立自由型', desc: '你需要个人空间，不喜欢被束缚。你认为爱情是生活的调味品而非全部。你独立自主，恋爱中保持自我。' }
                ],
                stress: [
                    { type: '✅ 低压力 - 轻松应对', desc: '目前你的状态很不错！压力水平适中，能够很好地平衡工作和生活。继续保持着种状态，注意劳逸结合就好。' },
                    { type: '⚠️ 中等压力 - 适当调节', desc: '你现在有一定的压力，但还在可控制范围内。建议适当放松自己，可以尝试运动或者冥想来缓解压力。' },
                    { type: '🔶 较高压力 - 需要关注', desc: '你的压力比较大，需要引起重视了。建议找朋友倾诉或者寻求专业帮助。不要一个人硬扛，适当释放情绪。' },
                    { type: '🔴 高压力 - 紧急处理', desc: '你的压力已经很高了，需要立即采取措施。建议暂时放下手中的事情，好好的休息调整。必要时请寻求专业心理帮助。' }
                ],
                persona: [
                    { type: '🌈 创造者 (INFP)', desc: '你富有想象力和理想主义色彩，注重内心的价值观。你善于洞察他人的情感，喜欢追求有意义的目标。' },
                    { type: '🎯 冒险者 (ENTP)', desc: '你思维活跃，喜欢挑战和创新。你善于辩论，喜欢收集信息。你不喜欢无聊的生活，追求新鲜感。' },
                    { type: '🏢 管理者 (ENTJ)', desc: '你天生有领导才能，果断有决断力。你目标明确，行动力强。你善于规划和组织，不喜欢拖泥带水。' },
                    { type: '🛡️ 守卫者 (ISFJ)', desc: '你忠诚可靠，注重细节和传统。你善于照顾他人，默默付出。你有强烈的责任感，是可以信赖的朋友。' }
                ]
            };

            const testResults = results[testId];
            let index = Math.floor((avgScore - 1) / (25 / testResults.length));
            index = Math.max(0, Math.min(index, testResults.length - 1));
            return testResults[index];
        }

        // 更新进度条
        function updateProgress() {
            const test = TESTS[currentTest];
            const progress = ((currentQuestion + 1) / test.questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = `${currentQuestion + 1} / ${test.questions.length}`;
            document.getElementById('progress-container').style.display = 'block';
        }

        // 返回菜单
        function backToMenu() {
            document.getElementById('test-area').classList.remove('active');
            document.getElementById('result-area').classList.remove('active');
            document.getElementById('test-menu').style.display = 'grid';
            currentTest = null;
        }

        // 分享结果
        function shareResult(platform) {
            alert('分享功能开发中...');
        }

        // 复制结果
        function copyResult() {
            const type = document.getElementById('result-type').textContent;
            const desc = document.getElementById('result-desc').textContent;
            const text = `🧩 心理测试结果\n\n${type}\n\n${desc}\n\n在线测试：https://lustrous-lollipop-ab71f9.netlify.app/`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('结果已复制到剪贴板！');
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定测试卡片点击事件
            document.querySelectorAll('.test-card').forEach(card => {
                card.addEventListener('click', function() {
                    const testType = this.getAttribute('data-test');
                    if (testType) startTest(testType);
                });
            });
            
            backToMenu();
        });
    </script>
</body>
</html>
