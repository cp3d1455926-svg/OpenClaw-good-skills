<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚄 高铁追踪器 - 虹桥公园观赏点</title>
    <meta name="description" content="深圳虹桥公园高铁观赏点实时追踪器，提供列车时刻预测、最佳拍照位置推荐">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .next-train {
            text-align: center;
            padding: 15px;
        }

        .train-icon {
            font-size: 3em;
            margin-bottom: 10px;
            animation: trainMove 2s ease-in-out infinite;
        }

        @keyframes trainMove {
            0%, 100% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
        }

        .countdown {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .train-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .train-detail {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 0.9em;
        }

        .schedule-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .train-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .train-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1em;
        }

        .train-route {
            color: #666;
            font-size: 0.85em;
            margin: 3px 0;
        }

        .train-time {
            text-align: right;
        }

        .time {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }

        .time-label {
            font-size: 0.8em;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #667eea;
            color: #fff;
            border-radius: 10px;
            font-size: 0.75em;
            margin-left: 5px;
        }

        .badge.soon {
            background: #f5576c;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .spot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .spot-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .spot-icon {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .spot-name {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 3px;
        }

        .spot-desc {
            font-size: 0.75em;
            opacity: 0.9;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            margin: 10px 0;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .tip-icon {
            font-size: 1.2em;
            margin-right: 10px;
        }

        .tip-text {
            flex: 1;
        }

        .tip-title {
            font-weight: bold;
            margin-bottom: 3px;
            color: #667eea;
            font-size: 0.9em;
        }

        .tip-desc {
            color: #666;
            line-height: 1.4;
            font-size: 0.85em;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            opacity: 0.8;
            font-size: 0.85em;
        }

        .refresh-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: rotate(180deg) scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚄 高铁追踪器</h1>
            <p>深圳虹桥公园 · 实时列车预测</p>
        </div>

        <!-- 下一班车 -->
        <div class="card">
            <div class="next-train">
                <div class="train-icon" id="trainIcon">🚄</div>
                <h2>下一班高铁</h2>
                <div class="countdown" id="countdown">--:--</div>
                <p id="trainStatus">正在获取实时数据...</p>
            </div>
            
            <div class="train-info" id="trainInfo" style="display: none;">
                <div class="train-detail">
                    <span>车次</span>
                    <span id="trainNumber">--</span>
                </div>
                <div class="train-detail">
                    <span>路线</span>
                    <span id="trainRoute">--</span>
                </div>
                <div class="train-detail">
                    <span>车型</span>
                    <span id="trainType">--</span>
                </div>
                <div class="train-detail">
                    <span>方向</span>
                    <span id="trainDirection">--</span>
                </div>
            </div>
        </div>

        <!-- 列车时刻表 -->
        <div class="card">
            <div class="schedule-title">📋 今日时刻表</div>
            <div id="scheduleList">
                <div style="text-align: center; padding: 20px;">加载中...</div>
            </div>
        </div>

        <!-- 最佳观赏点 -->
        <div class="card">
            <div class="schedule-title">📸 最佳观赏点</div>
            <div class="spot-grid">
                <div class="spot-item">
                    <div class="spot-icon">🌉</div>
                    <div class="spot-name">空中栈道 K1+200</div>
                    <div class="spot-desc">视野最佳</div>
                </div>
                <div class="spot-item">
                    <div class="spot-icon">🏞️</div>
                    <div class="spot-name">观景平台 B 区</div>
                    <div class="spot-desc">安全距离</div>
                </div>
                <div class="spot-item">
                    <div class="spot-icon">🌅</div>
                    <div class="spot-name">西侧观景台</div>
                    <div class="spot-desc">日落最美</div>
                </div>
            </div>
        </div>

        <!-- 拍照提示 -->
        <div class="card">
            <div class="schedule-title">💡 拍照小贴士</div>
            
            <div class="tip-item">
                <div class="tip-icon">📷</div>
                <div class="tip-text">
                    <div class="tip-title">相机设置</div>
                    <div class="tip-desc">快门 1/1000s+，连拍模式，长焦 200mm+</div>
                </div>
            </div>
            
            <div class="tip-item">
                <div class="tip-icon">⏰</div>
                <div class="tip-text">
                    <div class="tip-title">最佳时间</div>
                    <div class="tip-desc">清晨 7-9 点或傍晚 17-19 点</div>
                </div>
            </div>
            
            <div class="tip-item">
                <div class="tip-icon">⚠️</div>
                <div class="tip-text">
                    <div class="tip-title">安全提示</div>
                    <div class="tip-desc">请在安全区域拍摄，不要翻越护栏</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>📍 深圳虹桥公园</p>
            <p>🚄 列车经过时间约 30 秒</p>
            <p style="margin-top: 10px;">Made with ❤️ by 小鬼</p>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshData()" title="刷新数据">🔄</button>

    <script>
        // 列车时刻表数据
        const trainSchedule = [
            { number: 'G6204', from: '深圳北', to: '广州南', time: '07:35', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'G6208', from: '深圳北', to: '广州南', time: '08:12', type: '复兴号 CR400BF', direction: '北行' },
            { number: 'D662', from: '深圳北', to: '厦门', time: '08:45', type: '和谐号 CRH2A', direction: '东行' },
            { number: 'G6212', from: '深圳北', to: '广州南', time: '09:20', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'G2902', from: '深圳北', to: '贵阳北', time: '09:55', type: '复兴号 CR400BF', direction: '西北' },
            { number: 'G6216', from: '深圳北', to: '广州南', time: '10:30', type: '和谐号 CRH380A', direction: '北行' },
            { number: 'D666', from: '深圳北', to: '福州', time: '11:05', type: '和谐号 CRH2A', direction: '东北' },
            { number: 'G6220', from: '深圳北', to: '广州南', time: '11:40', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'G2906', from: '深圳北', to: '成都东', time: '12:15', type: '复兴号 CR400BF', direction: '西北' },
            { number: 'G6224', from: '深圳北', to: '广州南', time: '12:50', type: '和谐号 CRH380A', direction: '北行' },
            { number: 'G6228', from: '深圳北', to: '广州南', time: '13:25', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'D670', from: '深圳北', to: '汕头', time: '14:00', type: '和谐号 CRH2A', direction: '东行' },
            { number: 'G6232', from: '深圳北', to: '广州南', time: '14:35', type: '复兴号 CR400BF', direction: '北行' },
            { number: 'G2910', from: '深圳北', to: '昆明南', time: '15:10', type: '复兴号 CR400AF', direction: '西北' },
            { number: 'G6236', from: '深圳北', to: '广州南', time: '15:45', type: '和谐号 CRH380A', direction: '北行' },
            { number: 'G6240', from: '深圳北', to: '广州南', time: '16:20', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'D674', from: '深圳北', to: '漳州', time: '16:55', type: '和谐号 CRH2A', direction: '东行' },
            { number: 'G6244', from: '深圳北', to: '广州南', time: '17:30', type: '复兴号 CR400BF', direction: '北行' },
            { number: 'G2914', from: '深圳北', to: '重庆西', time: '18:05', type: '复兴号 CR400AF', direction: '西北' },
            { number: 'G6248', from: '深圳北', to: '广州南', time: '18:40', type: '和谐号 CRH380A', direction: '北行' },
            { number: 'G6252', from: '深圳北', to: '广州南', time: '19:15', type: '复兴号 CR400AF', direction: '北行' },
            { number: 'D678', from: '深圳北', to: '潮汕', time: '19:50', type: '和谐号 CRH2A', direction: '东行' },
            { number: 'G6256', from: '深圳北', to: '广州南', time: '20:25', type: '复兴号 CR400BF', direction: '北行' },
            { number: 'G2918', from: '深圳北', to: '西安北', time: '21:00', type: '复兴号 CR400AF', direction: '西北' }
        ];

        function getCurrentTime() {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        function parseTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        }

        function updateCountdown() {
            const now = new Date();
            const currentMinutes = getCurrentTime();
            
            let nextTrain = null;
            let minDiff = Infinity;
            
            trainSchedule.forEach(train => {
                const trainMinutes = parseTime(train.time);
                const diff = trainMinutes - currentMinutes;
                
                if (diff > 0 && diff < minDiff) {
                    minDiff = diff;
                    nextTrain = train;
                }
            });

            if (nextTrain) {
                const hours = Math.floor(minDiff / 60);
                const mins = minDiff % 60;
                
                document.getElementById('countdown').textContent = 
                    `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
                
                document.getElementById('trainStatus').textContent = 
                    `距下一班车还有 ${minDiff} 分钟`;
                
                document.getElementById('trainInfo').style.display = 'block';
                document.getElementById('trainNumber').textContent = nextTrain.number;
                document.getElementById('trainRoute').textContent = `${nextTrain.from} → ${nextTrain.to}`;
                document.getElementById('trainType').textContent = nextTrain.type;
                document.getElementById('trainDirection').textContent = nextTrain.direction;
                
                if (minDiff <= 5) {
                    document.getElementById('trainIcon').textContent = '🚄💨';
                } else {
                    document.getElementById('trainIcon').textContent = '🚄';
                }
            } else {
                document.getElementById('countdown').textContent = '--:--';
                document.getElementById('trainStatus').textContent = '今日列车已全部通过';
                document.getElementById('trainInfo').style.display = 'none';
            }
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleList');
            const currentMinutes = getCurrentTime();
            
            let html = '';
            trainSchedule.forEach(train => {
                const trainMinutes = parseTime(train.time);
                const diff = trainMinutes - currentMinutes;
                const isPassed = diff < 0;
                const isSoon = diff > 0 && diff <= 10;
                
                if (!isPassed) {
                    const soonBadge = isSoon ? '<span class="badge soon">即将到达</span>' : '';
                    const timeBadge = diff <= 30 ? '<span class="badge">30 分钟内</span>' : '';
                    
                    html += `
                        <div class="train-item" style="${isSoon ? 'border-left-color: #f5576c;' : ''}">
                            <div>
                                <div class="train-number">${train.number} ${soonBadge || timeBadge}</div>
                                <div class="train-route">${train.from} → ${train.to}</div>
                            </div>
                            <div class="train-time">
                                <div class="time">${train.time}</div>
                                <div class="time-label">${train.direction}</div>
                            </div>
                        </div>
                    `;
                }
            });
            
            if (html === '') {
                html = '<div style="text-align: center; padding: 20px; color: #999;">今日列车已全部通过</div>';
            }
            
            container.innerHTML = html;
        }

        function refreshData() {
            updateCountdown();
            renderSchedule();
            
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: #fff;
                padding: 10px 20px;
                border-radius: 8px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideDown 0.3s ease;
            `;
            tip.textContent = '数据已刷新';
            document.body.appendChild(tip);
            
            setTimeout(() => {
                tip.style.opacity = '0';
                tip.style.transition = 'opacity 0.3s ease';
                setTimeout(() => tip.remove(), 300);
            }, 2000);
        }

        window.onload = function() {
            updateCountdown();
            renderSchedule();
            setInterval(updateCountdown, 60000);
        };
    </script>
</body>
</html>
