<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 OpenClaw 像素办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d1a;
            color: #fff;
            overflow: hidden;
        }
        
        #app {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh;
            gap: 2px;
            background: #1a1a2e;
        }
        
        /* 顶部栏 */
        #header {
            grid-column: 1 / -1;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 3px solid #e94560;
        }
        
        #header h1 {
            font-size: 20px;
            color: #e94560;
            text-shadow: 2px 2px 0 #000;
        }
        
        #status-badge {
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            border: 2px solid #e94560;
        }
        
        /* 左侧面板 - 状态控制 */
        #left-panel {
            background: #1a1a2e;
            padding: 15px;
            border-right: 3px solid #0f3460;
            overflow-y: auto;
        }
        
        .panel-title {
            color: #e94560;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .status-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .status-btn {
            background: #0f3460;
            border: 2px solid #16213e;
            color: #fff;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
            border-radius: 4px;
        }
        
        .status-btn:hover {
            background: #1a1a2e;
            border-color: #e94560;
        }
        
        .status-btn.active {
            background: #e94560;
            border-color: #fff;
        }
        
        /* 中间 - 办公室场景 */
        #office-container {
            position: relative;
            background: #0d0d1a;
            overflow: hidden;
        }
        
        #office-canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
        }
        
        /* 右侧面板 - 昨日小记 */
        #right-panel {
            background: #1a1a2e;
            padding: 15px;
            border-left: 3px solid #0f3460;
            overflow-y: auto;
        }
        
        #yesterday-memo {
            background: #16213e;
            padding: 15px;
            border-radius: 4px;
            border: 2px solid #0f3460;
        }
        
        #yesterday-memo h3 {
            color: #f39c12;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        #yesterday-memo-content {
            font-size: 12px;
            line-height: 1.6;
            color: #ccc;
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 底部 - 技能墙 */
        #skill-wall {
            grid-column: 1 / -1;
            background: #16213e;
            padding: 15px;
            border-top: 3px solid #e94560;
            overflow-y: auto;
        }
        
        #skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        
        .skill-card {
            background: #0f3460;
            border: 2px solid #1a1a2e;
            border-radius: 4px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .skill-card:hover {
            border-color: #e94560;
            transform: translateY(-2px);
        }
        
        .skill-card .icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .skill-card .name {
            font-size: 11px;
            color: #fff;
            margin-bottom: 3px;
        }
        
        .skill-card .status {
            font-size: 10px;
            color: #2ecc71;
        }
        
        /* 状态指示器 */
        #lobster-status {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
            border: 2px solid #e94560;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #lobster-status .emoji {
            font-size: 24px;
        }
        
        /* 区域标签 */
        .zone-label {
            position: absolute;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0d0d1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 顶部栏 -->
        <div id="header">
            <h1>🦞 OpenClaw 像素办公室</h1>
            <div id="status-badge">状态：<span id="current-status">idle</span></div>
        </div>
        
        <!-- 左侧面板 - 状态控制 -->
        <div id="left-panel">
            <div class="panel-title">⚡ 状态控制</div>
            <div class="status-buttons">
                <button class="status-btn active" data-status="idle">🛋️ idle - 待命</button>
                <button class="status-btn" data-status="writing">💻 writing - 写作中</button>
                <button class="status-btn" data-status="researching">🔍 researching - 调研中</button>
                <button class="status-btn" data-status="executing">⚙️ executing - 执行中</button>
                <button class="status-btn" data-status="syncing">🔄 syncing - 同步中</button>
                <button class="status-btn" data-status="error">🐛 error - 异常</button>
            </div>
            
            <div style="margin-top: 30px;">
                <div class="panel-title">📊 统计</div>
                <div style="font-size: 12px; color: #ccc; line-height: 2;">
                    技能总数：<span id="total-skills">43</span><br>
                    活跃技能：<span id="active-skills">0</span><br>
                    今日任务：<span id="today-tasks">0</span>
                </div>
            </div>
        </div>
        
        <!-- 中间 - 办公室场景 -->
        <div id="office-container">
            <canvas id="office-canvas"></canvas>
            <div id="lobster-status">
                <span class="emoji">🦞</span>
                <span id="status-text">小鬼待命中...</span>
            </div>
        </div>
        
        <!-- 右侧面板 - 昨日小记 -->
        <div id="right-panel">
            <div class="panel-title">📝 昨日小记</div>
            <div id="yesterday-memo">
                <h3>📅 2026-03-18</h3>
                <div id="yesterday-memo-content">
                    正在加载记忆...
                </div>
            </div>
            
            <div style="margin-top: 20px;">
                <div class="panel-title">🎯 当前位置</div>
                <div id="current-zone" style="font-size: 14px; color: #e94560;">🛋️ 休息区</div>
            </div>
        </div>
        
        <!-- 底部 - 技能墙 -->
        <div id="skill-wall">
            <div class="panel-title">📦 技能墙 (43 个技能)</div>
            <div id="skill-grid"></div>
        </div>
    </div>

    <script>
        // 状态配置
        const STATES = {
            idle: { zone: 'lounge', emoji: '🛋️', text: '小鬼待命中...', color: '#27ae60' },
            writing: { zone: 'desk', emoji: '💻', text: '正在写代码/文档...', color: '#3498db' },
            researching: { zone: 'desk', emoji: '🔍', text: '正在搜索调研...', color: '#9b59b6' },
            executing: { zone: 'desk', emoji: '⚙️', text: '正在执行命令...', color: '#e67e22' },
            syncing: { zone: 'desk', emoji: '🔄', text: '正在同步数据...', color: '#1abc9c' },
            error: { zone: 'bug', emoji: '🐛', text: '遇到问题，排查中...', color: '#e74c3c' }
        };
        
        // 办公室区域
        const ZONES = {
            lounge: { x: 100, y: 200, w: 200, h: 150, color: '#27ae60', name: '🛋️ 休息区' },
            desk: { x: 400, y: 150, w: 300, h: 200, color: '#3498db', name: '💻 工作区' },
            bug: { x: 100, y: 400, w: 150, h: 150, color: '#e74c3c', name: '🐛 Bug 区' },
            server: { x: 600, y: 400, w: 200, h: 150, color: '#8e44ad', name: '🖥️ 服务器' },
            meeting: { x: 400, y: 50, w: 250, h: 80, color: '#f39c12', name: ' 会议室' }
        };
        
        // 技能列表（43 个中的部分示例）
        const SKILLS = [
            { name: '邮件助手', icon: '📧', status: 'ready' },
            { name: '日历管理', icon: '📅', status: 'ready' },
            { name: '菜谱查找', icon: '🍳', status: 'ready' },
            { name: '股票监控', icon: '📈', status: 'ready' },
            { name: '书籍推荐', icon: '📚', status: 'ready' },
            { name: '会议助手', icon: '💼', status: 'ready' },
            { name: '天气查询', icon: '🌤️', status: 'ready' },
            { name: '电影推荐', icon: '🎬', status: 'ready' },
            { name: '音乐助手', icon: '🎵', status: 'ready' },
            { name: '价格监控', icon: '💰', status: 'ready' },
            { name: '小红书助手', icon: '📕', status: 'ready' },
            { name: '健康检查', icon: '💚', status: 'ready' },
            { name: '语音合成', icon: '🔊', status: 'ready' },
            { name: '网页搜索', icon: '🌐', status: 'ready' },
            { name: '文件管理', icon: '📁', status: 'ready' },
            { name: '代码执行', icon: '💻', status: 'ready' },
            { name: '浏览器控制', icon: '🖱️', status: 'ready' },
            { name: '消息发送', icon: '💬', status: 'ready' },
            { name: '会话管理', icon: '📋', status: 'ready' },
            { name: '子代理', icon: '🤖', status: 'ready' },
            { name: '飞书文档', icon: '📄', status: 'ready' },
            { name: '飞书表格', icon: '📊', status: 'ready' },
            { name: '飞书云盘', icon: '☁️', status: 'ready' },
            { name: '飞书知识库', icon: '📚', status: 'ready' }
        ];
        
        // 当前状态
        let currentState = 'idle';
        let lobsterPos = { x: ZONES.lounge.x + 80, y: ZONES.lounge.y + 60 };
        let targetPos = { ...lobsterPos };
        
        // Canvas 设置
        const canvas = document.getElementById('office-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('office-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 绘制像素龙虾
        function drawLobster(x, y, direction = 'right') {
            const size = 4;
            ctx.fillStyle = '#ff6b6b';
            
            // 身体
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 6; j++) {
                    if (!((i === 0 || i === 7) && (j === 0 || j === 5))) {
                        ctx.fillRect(
                            Math.floor((x + i * size) / size) * size,
                            Math.floor((y + j * size) / size) * size,
                            size, size
                        );
                    }
                }
            }
            
            // 钳子
            ctx.fillStyle = '#ff5252';
            const clawOffset = direction === 'right' ? 8 : -2;
            ctx.fillRect(
                Math.floor((x + clawOffset * size) / size) * size,
                Math.floor((y + 2 * size) / size) * size,
                size * 2, size
            );
            ctx.fillRect(
                Math.floor((x + clawOffset * size) / size) * size,
                Math.floor((y + 4 * size) / size) * size,
                size * 2, size
            );
            
            // 眼睛
            ctx.fillStyle = '#fff';
            const eyeX = direction === 'right' ? x + 6 * size : x + 1 * size;
            ctx.fillRect(Math.floor(eyeX / size) * size, Math.floor((y + 1 * size) / size) * size, size, size);
            ctx.fillRect(Math.floor(eyeX / size) * size, Math.floor((y + 5 * size) / size) * size, size, size);
            
            // 眼珠
            ctx.fillStyle = '#000';
            const pupilX = direction === 'right' ? x + 7 * size : x + 1 * size;
            ctx.fillRect(Math.floor(pupilX / size) * size, Math.floor((y + 1 * size) / size) * size, 2, 2);
            ctx.fillRect(Math.floor(pupilX / size) * size, Math.floor((y + 5 * size) / size) * size, 2, 2);
        }
        
        // 绘制区域
        function drawZone(zone) {
            ctx.fillStyle = zone.color + '40';
            ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
            
            ctx.strokeStyle = zone.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
            
            ctx.fillStyle = '#fff';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(zone.name, zone.x + zone.w / 2, zone.y + zone.h / 2);
        }
        
        // 绘制场景
        function drawScene() {
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制区域
            Object.values(ZONES).forEach(zone => drawZone(zone));
            
            // 绘制龙虾
            drawLobster(lobsterPos.x, lobsterPos.y, 'right');
        }
        
        // 更新龙虾位置
        function updateLobster() {
            const dx = targetPos.x - lobsterPos.x;
            const dy = targetPos.y - lobsterPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 5) {
                lobsterPos.x += dx * 0.05;
                lobsterPos.y += dy * 0.05;
            }
            
            drawScene();
            requestAnimationFrame(updateLobster);
        }
        
        // 切换状态
        function setState(status) {
            currentState = status;
            const config = STATES[status];
            
            // 更新 UI
            document.getElementById('current-status').textContent = status;
            document.getElementById('status-text').textContent = config.text;
            document.getElementById('current-zone').textContent = config.zone === 'lounge' ? '🛋️ 休息区' : 
                                                                  config.zone === 'desk' ? '💻 工作区' : '🐛 Bug 区';
            
            // 更新按钮状态
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            
            // 移动龙虾到对应区域
            const zone = ZONES[config.zone];
            targetPos = {
                x: zone.x + zone.w / 2 - 16,
                y: zone.y + zone.h / 2 - 12
            };
            
            // 更新状态徽章颜色
            document.getElementById('status-badge').style.borderColor = config.color;
        }
        
        // 渲染技能墙
        function renderSkills() {
            const grid = document.getElementById('skill-grid');
            grid.innerHTML = SKILLS.map(skill => `
                <div class="skill-card">
                    <div class="icon">${skill.icon}</div>
                    <div class="name">${skill.name}</div>
                    <div class="status">${skill.status === 'ready' ? '✅ 就绪' : '⏳ 运行中'}</div>
                </div>
            `).join('');
        }
        
        // 加载昨日记忆
        function loadYesterdayMemo() {
            const memoContent = document.getElementById('yesterday-memo-content');
            // 这里可以实际读取 memory 文件，现在用示例
            memoContent.innerHTML = `
                <strong style="color: #2ecc71;">✅ 12 天冲刺计划完成!</strong><br><br>
                • 优化 6 个核心技能 (v2.0)<br>
                • 代码量提升 4.7 倍<br>
                • 双仓库方案建立<br>
                • ClawHub 发布材料就绪<br><br>
                <em style="color: #f39c12;">🎉 成就感满满!</em>
            `;
        }
        
        // 事件绑定
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => setState(btn.dataset.status));
        });
        
        // 初始化
        renderSkills();
        loadYesterdayMemo();
        updateLobster();
        
        // 模拟状态变化（可移除）
        setInterval(() => {
            const states = Object.keys(STATES);
            const random = states[Math.floor(Math.random() * states.length)];
            // setState(random); // 自动演示用
        }, 10000);
    </script>
</body>
</html>
