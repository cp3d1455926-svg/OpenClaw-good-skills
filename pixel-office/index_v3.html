<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 OpenClaw 像素办公室</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --bg-card: #1a1a25;
            --bg-hover: #222230;
            --accent: #ff4757;
            --accent-soft: rgba(255, 71, 87, 0.15);
            --accent-glow: rgba(255, 71, 87, 0.4);
            --primary: #5352ed;
            --success: #2ed573;
            --warning: #ffa502;
            --text-primary: #ffffff;
            --text-secondary: #747d8c;
            --border: #2d2d3a;
            --border-light: #3d3d4a;
            --pixel-size: 3px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        #app {
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 1fr 200px;
            height: 100vh;
            gap: 0;
            background: var(--bg-dark);
        }
        
        /* 主场景区域 */
        #main-scene {
            grid-row: 1 / 2;
            grid-column: 1 / 2;
            position: relative;
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
            overflow: hidden;
        }
        
        #scene-canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 顶部状态栏 */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(180deg, rgba(18,18,26,0.95) 0%, rgba(18,18,26,0.85) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        #logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        
        #logo .emoji {
            font-size: 22px;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #current-status {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        #current-status span {
            color: var(--text-primary);
            font-weight: 600;
            text-transform: capitalize;
        }
        
        /* 右侧面板 */
        #side-panel {
            grid-row: 1 / 3;
            grid-column: 2 / 3;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title::before {
            content: '';
            width: 2px;
            height: 14px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--primary) 100%);
            display: block;
            border-radius: 2px;
        }
        
        /* 状态按钮组 */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        
        .status-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .status-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.4s;
        }
        
        .status-btn:hover::before {
            left: 100%;
        }
        
        .status-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .status-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateY(0);
        }
        
        .status-btn .btn-icon {
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
        }
        
        /* 昨日小记 */
        #memo-content {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 14px;
            font-size: 11px;
            line-height: 1.9;
            color: var(--text-secondary);
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        
        #memo-content strong {
            color: var(--success);
            font-weight: 600;
        }
        
        #memo-content em {
            color: var(--warning);
            font-style: normal;
        }
        
        #memo-content ul {
            list-style: none;
            padding-left: 0;
            margin-top: 8px;
        }
        
        #memo-content li {
            padding: 2px 0;
        }
        
        #memo-content li::before {
            content: '• ';
            color: var(--accent);
            font-weight: bold;
        }
        
        /* 技能列表 */
        #skills-panel {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        #skills-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .skill-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(4px);
        }
        
        .skill-item .skill-icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .skill-item .skill-info {
            flex: 1;
            min-width: 0;
        }
        
        .skill-item .skill-name {
            font-size: 11px;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .skill-item .skill-desc {
            font-size: 9px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .skill-item .skill-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
            flex-shrink: 0;
        }
        
        /* 底部技能墙 */
        #skill-wall {
            grid-row: 2 / 3;
            grid-column: 1 / 2;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        #skill-wall-header {
            padding: 10px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        #skill-wall-header .title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        #skill-wall-header .count {
            background: var(--accent);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
        }
        
        #skill-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1px;
            background: var(--border);
            overflow-y: auto;
            padding: 1px;
        }
        
        .skill-card {
            background: var(--bg-panel);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .skill-card:hover {
            background: var(--bg-hover);
            z-index: 1;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .skill-card .icon {
            font-size: 24px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .skill-card .name {
            font-size: 9px;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.3;
        }
        
        .skill-card .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-top: 6px;
            box-shadow: 0 0 4px var(--success);
        }
        
        /* 场景中的角色状态气泡 */
        #character-bubble {
            position: absolute;
            background: rgba(18, 18, 26, 0.98);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 11px;
            color: var(--text-primary);
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #character-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid var(--accent);
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .loading-dots {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: loading 1.4s infinite;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes loading {
            0%, 100% { transform: scale(0.6); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 主场景 -->
        <div id="main-scene">
            <canvas id="scene-canvas"></canvas>
            
            <!-- 顶部状态栏 -->
            <div id="top-bar">
                <div id="logo">
                    <span class="emoji">🦞</span>
                    <span>OpenClaw 像素办公室</span>
                </div>
                <div id="status-indicator">
                    <div class="status-dot"></div>
                    <div id="current-status">状态：<span>idle</span></div>
                </div>
            </div>
            
            <!-- 角色状态气泡 -->
            <div id="character-bubble" style="display: none;">
                <span id="bubble-text">待命中...</span>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div id="side-panel">
            <!-- 状态控制 -->
            <div class="panel-section">
                <div class="panel-title">状态控制</div>
                <div class="status-grid">
                    <button class="status-btn active" data-status="idle">
                        <span class="btn-icon">🛋️</span>
                        idle
                    </button>
                    <button class="status-btn" data-status="writing">
                        <span class="btn-icon">💻</span>
                        writing
                    </button>
                    <button class="status-btn" data-status="researching">
                        <span class="btn-icon">🔍</span>
                        researching
                    </button>
                    <button class="status-btn" data-status="executing">
                        <span class="btn-icon">⚙️</span>
                        executing
                    </button>
                    <button class="status-btn" data-status="syncing">
                        <span class="btn-icon">🔄</span>
                        syncing
                    </button>
                    <button class="status-btn" data-status="error">
                        <span class="btn-icon">🐛</span>
                        error
                    </button>
                </div>
            </div>
            
            <!-- 昨日小记 -->
            <div class="panel-section">
                <div class="panel-title">昨日小记</div>
                <div id="memo-content">
                    <strong>✅ 12 天冲刺计划完成!</strong><br>
                    <ul>
                        <li>优化 6 个核心技能 (v2.0)</li>
                        <li>代码量提升 4.7 倍</li>

                        <li>ClawHub 发布材料就绪</li>

                    <br>
                    <em>🎉 成就感满满!</em>
                </div>
            </div>
            
            <!-- 技能列表 -->
            <div id="skills-panel">
                <div class="panel-title">活跃技能</div>
                <div id="skills-list"></div>
            </div>
        </div>
        
        <!-- 底部技能墙 -->
        <div id="skill-wall">
            <div id="skill-wall-header">
                <span class="title">📦 技能墙</span>
                <span class="count" id="skill-count">43 个技能</span>
            </div>
            <div id="skill-grid"></div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            colors: {
                bg: '#0a0a0f',
                lounge: '#1e5a4a',
                desk: '#3a5a8a',
                bug: '#7a3a4a',
                server: '#5a3a6a',
                meeting: '#7a5a3a',
                accent: '#ff4757',
                pixel: 3
            },
            zones: {
                lounge: { x: 0.15, y: 0.5, w: 0.25, h: 0.35, name: '休息区' },
                desk: { x: 0.5, y: 0.35, w: 0.35, h: 0.4, name: '工作区' },
                bug: { x: 0.15, y: 0.75, w: 0.2, h: 0.2, name: 'Bug 区' },
                server: { x: 0.65, y: 0.7, w: 0.25, h: 0.25, name: '服务器' },
                meeting: { x: 0.5, y: 0.1, w: 0.3, h: 0.15, name: '会议室' }
            }
        };
        
        // 状态配置
        const STATES = {
            idle: { zone: 'lounge', emoji: '🛋️', text: '待命中...', color: '#4ecdc4' },
            writing: { zone: 'desk', emoji: '💻', text: '写代码/文档中...', color: '#4a90d9' },
            researching: { zone: 'desk', emoji: '🔍', text: '搜索调研中...', color: '#9b59b6' },
            executing: { zone: 'desk', emoji: '⚙️', text: '执行命令中...', color: '#e67e22' },
            syncing: { zone: 'desk', emoji: '🔄', text: '数据同步中...', color: '#1abc9c' },
            error: { zone: 'bug', emoji: '🐛', text: '遇到问题，排查中...', color: '#e74c3c' }
        };
        
        // 完整技能列表 (43 个)
        const SKILLS = [
            { name: '邮件助手', icon: '📧', desc: '8 种模板，中英文' },
            { name: '日历管理', icon: '📅', desc: '节日/纪念日/倒计时' },
            { name: '菜谱查找', icon: '🍳', desc: '12 道菜谱，营养分析' },
            { name: '股票监控', icon: '📈', desc: 'A 股/港股/美股' },
            { name: '书籍推荐', icon: '📚', desc: '20 本书，心情推荐' },
            { name: '会议助手', icon: '💼', desc: '模板/纪要/待办' },
            { name: '天气查询', icon: '🌤️', desc: '实时/预报/多城市' },
            { name: '电影推荐', icon: '🎬', desc: '豆瓣 API 对接' },
            { name: '音乐助手', icon: '🎵', desc: '网易云 API 对接' },
            { name: '价格监控', icon: '💰', desc: '电商爬虫优化' },
            { name: '小红书助手', icon: '📕', desc: '笔记发布/管理' },
            { name: '健康检查', icon: '💚', desc: '安全审计/加固' },
            { name: '语音合成', icon: '🔊', desc: 'ElevenLabs TTS' },
            { name: '网页搜索', icon: '🌐', desc: 'Brave Search API' },
            { name: '文件管理', icon: '📁', desc: '读/写/编辑' },
            { name: '代码执行', icon: '💻', desc: 'Shell 命令执行' },
            { name: '浏览器控制', icon: '🖱️', desc: 'Playwright 自动化' },
            { name: '消息发送', icon: '💬', desc: '多平台消息' },
            { name: '会话管理', icon: '📋', desc: '子代理/会话控制' },
            { name: '子代理', icon: '🤖', desc: 'Spawn/Steer/Kill' },
            { name: '飞书文档', icon: '📄', desc: 'Docx 读写/表格' },
            { name: '飞书表格', icon: '📊', desc: 'Bitable CRUD' },
            { name: '飞书云盘', icon: '☁️', desc: 'Drive 文件管理' },
            { name: '飞书知识库', icon: '📖', desc: 'Wiki 空间/节点' },
            { name: '画布控制', icon: '🎨', desc: 'Canvas 呈现/截图' },
            { name: '设备控制', icon: '📱', desc: 'Nodes 通知/相机' },
            { name: '技能创建', icon: '🛠️', desc: 'Skill 打包/发布' },
            { name: '内容总结', icon: '📝', desc: 'URL/视频/播客' },
            { name: 'ClawHub', icon: '🦎', desc: '技能市场' },
            { name: 'QQ 机器人', icon: '🐧', desc: 'Cron/媒体收发' },
            { name: '微信机器人', icon: '💚', desc: '企业微信集成' },
            { name: 'Telegram', icon: '✈️', desc: 'Bot 消息推送' },
            { name: 'Discord', icon: '🎮', desc: 'Server/Bot 管理' },
            { name: 'Slack', icon: '💬', desc: 'Channel/Thread' },
            { name: 'IRC', icon: '📡', desc: '传统 IRC 协议' },
            { name: 'Signal', icon: '📶', desc: '加密消息' },
            { name: 'WhatsApp', icon: '📞', desc: 'Business API' },
            { name: 'iMessage', icon: '💌', desc: 'Apple 消息' },
            { name: 'Google Chat', icon: '🔵', desc: 'Workspace 集成' },
            { name: 'Feishu 聊天', icon: '🚀', desc: '群/私聊管理' },
            { name: 'Feishu 权限', icon: '🔐', desc: '共享/协作设置' },
            { name: '会话状态', icon: '📊', desc: 'Usage/Cost 统计' },
            { name: 'Agent 列表', icon: '👥', desc: 'Subagent 管理' }
        ];
        
        // 状态
        let currentState = 'idle';
        let lobster = { x: 0, y: 0, targetX: 0, targetY: 0, frame: 0 };
        
        // Canvas
        const canvas = document.getElementById('scene-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('main-scene');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            updateLobsterPosition();
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 绘制像素龙虾
        function drawLobster(x, y, frame = 0) {
            const p = CONFIG.colors.pixel;
            ctx.fillStyle = CONFIG.colors.accent;
            
            // 身体动画
            const bounce = Math.sin(frame * 0.15) * 1.5;
            
            // 身体主体
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 8; col++) {
                    const skip = (row === 0 || row === 5) && (col === 0 || col === 7);
                    if (!skip) {
                        ctx.fillRect(
                            Math.floor(x + col * p),
                            Math.floor(y + row * p + bounce),
                            p, p
                        );
                    }
                }
            }
            
            // 钳子（开合动画）
            const clawOpen = Math.sin(frame * 0.25) * 2;
            ctx.fillStyle = '#ff6b7a';
            ctx.fillRect(Math.floor(x + 8 * p), Math.floor(y + 2 * p + bounce - clawOpen), p * 2, p);
            ctx.fillRect(Math.floor(x + 8 * p), Math.floor(y + 4 * p + bounce + clawOpen), p * 2, p);
            
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.fillRect(Math.floor(x + 6 * p), Math.floor(y + 1 * p + bounce), p, p);
            ctx.fillRect(Math.floor(x + 6 * p), Math.floor(y + 5 * p + bounce), p, p);
            
            // 眼珠
            ctx.fillStyle = '#000';
            ctx.fillRect(Math.floor(x + 7 * p), Math.floor(y + 1 * p + bounce), 2, 2);
            ctx.fillRect(Math.floor(x + 7 * p), Math.floor(y + 5 * p + bounce), 2, 2);
        }
        
        // 绘制区域
        function drawZone(key, zone) {
            const x = zone.x * canvas.width;
            const y = zone.y * canvas.height;
            const w = zone.w * canvas.width;
            const h = zone.h * canvas.height;
            
            // 区域背景
            ctx.fillStyle = CONFIG.colors[key] + '20';
            ctx.fillRect(x, y, w, h);
            
            // 区域边框
            ctx.strokeStyle = CONFIG.colors[key];
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
            ctx.setLineDash([]);
            
            // 区域名称
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(zone.name, x + w / 2, y + h / 2);
        }
        
        // 绘制场景
        function drawScene() {
            // 清空
            ctx.fillStyle = CONFIG.colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(45, 45, 58, 0.5)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制区域
            Object.entries(CONFIG.zones).forEach(([key, zone]) => {
                drawZone(key, zone);
            });
            
            // 绘制龙虾
            drawLobster(lobster.x, lobster.y, lobster.frame);
            lobster.frame++;
            
            requestAnimationFrame(drawScene);
        }
        
        // 更新龙虾位置
        function updateLobsterPosition() {
            const zone = CONFIG.zones[STATES[currentState].zone];
            lobster.targetX = zone.x * canvas.width + zone.w * canvas.width / 2 - 16;
            lobster.targetY = zone.y * canvas.height + zone.h * canvas.height / 2 - 12;
        }
        
        // 平滑移动龙虾
        function animateLobster() {
            const dx = lobster.targetX - lobster.x;
            const dy = lobster.targetY - lobster.y;
            
            if (Math.abs(dx) > 2) lobster.x += dx * 0.05;
            if (Math.abs(dy) > 2) lobster.y += dy * 0.05;
            
            // 更新气泡位置
            const bubble = document.getElementById('character-bubble');
            bubble.style.left = (lobster.x + 20) + 'px';
            bubble.style.top = (lobster.y - 40) + 'px';
            
            requestAnimationFrame(animateLobster);
        }
        
        // 切换状态
        function setState(status) {
            currentState = status;
            const config = STATES[status];
            
            // 更新 UI
            document.querySelector('#current-status span').textContent = status;
            document.querySelector('#bubble-text').textContent = config.text;
            document.getElementById('character-bubble').style.display = 'block';
            document.getElementById('character-bubble').style.borderColor = config.color;
            
            // 更新按钮
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            
            // 移动龙虾
            updateLobsterPosition();
        }
        
        // 渲染技能列表
        function renderSkills() {
            // 活跃技能列表（前 8 个）
            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = SKILLS.slice(0, 8).map(skill => `
                <div class="skill-item">
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-info">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.desc}</div>
                    </div>
                    <div class="skill-status"></div>
                </div>
            `).join('');
            
            // 技能墙
            const skillGrid = document.getElementById('skill-grid');
            skillGrid.innerHTML = SKILLS.map(skill => `
                <div class="skill-card" title="${skill.desc}">
                    <div class="icon">${skill.icon}</div>
                    <div class="name">${skill.name}</div>
                    <div class="status-dot"></div>
                </div>
            `).join('');
        }
        
        // 事件绑定
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => setState(btn.dataset.status));
        });
        
        // 技能卡片点击
        document.addEventListener('click', (e) => {
            const card = e.target.closest('.skill-card');
            if (card) {
                const name = card.querySelector('.name').textContent;
                const skill = SKILLS.find(s => s.name === name);
                if (skill) {
                    document.getElementById('bubble-text').textContent = `${skill.icon} ${skill.name}: ${skill.desc}`;
                    document.getElementById('character-bubble').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('character-bubble').style.display = 'none';
                    }, 3000);
                }
            }
        });
        
        // 初始化
        renderSkills();
        drawScene();
        animateLobster();
        
        // 5 秒后隐藏气泡
        setTimeout(() => {
            document.getElementById('character-bubble').style.display = 'none';
        }, 5000);
    </script>
</body>
</html>
