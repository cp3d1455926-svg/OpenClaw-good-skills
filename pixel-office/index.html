<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 OpenClaw 像素办公室</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --bg-card: #1a1a25;
            --bg-hover: #222230;
            --accent: #ff4757;
            --accent-soft: rgba(255, 71, 87, 0.15);
            --accent-glow: rgba(255, 71, 87, 0.4);
            --primary: #5352ed;
            --success: #2ed573;
            --warning: #ffa502;
            --info: #70a1ff;
            --text-primary: #ffffff;
            --text-secondary: #747d8c;
            --border: #2d2d3a;
            --border-light: #3d3d4a;
            --pixel-size: 3px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        #app {
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 1fr 220px;
            height: 100vh;
            gap: 0;
            background: var(--bg-dark);
        }
        
        /* 主场景区域 */
        #main-scene {
            grid-row: 1 / 2;
            grid-column: 1 / 2;
            position: relative;
            background: linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
            overflow: hidden;
        }
        
        #scene-canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 顶部状态栏 */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(180deg, rgba(18,18,26,0.95) 0%, rgba(18,18,26,0.85) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        #logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        
        #logo .emoji {
            font-size: 22px;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        
        /* 实时状态指示器 */
        #live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-card);
            border-radius: 6px;
            font-size: 10px;
            color: var(--success);
            border: 1px solid var(--border);
        }
        
        #live-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        
        #current-status {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        #current-status span {
            color: var(--text-primary);
            font-weight: 600;
            text-transform: capitalize;
        }
        
        /* 时间显示 */
        #time-display {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        /* 右侧面板 */
        #side-panel {
            grid-row: 1 / 3;
            grid-column: 2 / 3;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title::before {
            content: '';
            width: 2px;
            height: 14px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--primary) 100%);
            display: block;
            border-radius: 2px;
        }
        
        /* 状态按钮组 */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        
        .status-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .status-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.4s;
        }
        
        .status-btn:hover::before {
            left: 100%;
        }
        
        .status-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .status-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateY(0);
        }
        
        .status-btn .btn-icon {
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
        }
        
        /* 昨日小记 */
        #memo-content {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 14px;
            font-size: 11px;
            line-height: 1.9;
            color: var(--text-secondary);
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        
        #memo-content strong {
            color: var(--success);
            font-weight: 600;
        }
        
        #memo-content em {
            color: var(--warning);
            font-style: normal;
        }
        
        #memo-content ul {
            list-style: none;
            padding-left: 0;
            margin-top: 8px;
        }
        
        #memo-content li {
            padding: 2px 0;
        }
        
        #memo-content li::before {
            content: '• ';
            color: var(--accent);
            font-weight: bold;
        }
        
        /* 技能搜索框 */
        #skill-search {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 11px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        #skill-search:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-soft);
        }
        
        #skill-search::placeholder {
            color: var(--text-secondary);
        }
        
        /* 技能列表 */
        #skills-panel {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        #skills-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .skill-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(4px);
        }
        
        .skill-item .skill-icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .skill-item .skill-info {
            flex: 1;
            min-width: 0;
        }
        
        .skill-item .skill-name {
            font-size: 11px;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .skill-item .skill-desc {
            font-size: 9px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .skill-item .skill-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
            flex-shrink: 0;
        }
        
        /* 底部技能墙 */
        #skill-wall {
            grid-row: 2 / 3;
            grid-column: 1 / 2;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        #skill-wall-header {
            padding: 10px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        #skill-wall-header .title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        #skill-wall-header .count {
            background: var(--accent);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
        }
        
        #skill-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1px;
            background: var(--border);
            overflow-y: auto;
            padding: 1px;
        }
        
        .skill-card {
            background: var(--bg-panel);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .skill-card:hover {
            background: var(--bg-hover);
            z-index: 1;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .skill-card .icon {
            font-size: 24px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .skill-card .name {
            font-size: 9px;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.3;
        }
        
        .skill-card .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-top: 6px;
            box-shadow: 0 0 4px var(--success);
        }
        
        /* 场景中的角色状态气泡 */
        #character-bubble {
            position: absolute;
            background: rgba(18, 18, 26, 0.98);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 11px;
            color: var(--text-primary);
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #character-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid var(--accent);
        }
        
        /* 技能详情弹窗 */
        #skill-detail-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(18, 18, 26, 0.98);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #skill-detail-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        
        #skill-detail-modal .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        #skill-detail-modal .modal-icon {
            font-size: 32px;
        }
        
        #skill-detail-modal .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        #skill-detail-modal .modal-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 16px;
        }
        
        #skill-detail-modal .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .stat-item {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        #skill-detail-modal .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        #skill-detail-modal .modal-close:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        /* 遮罩层 */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        #modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        /* GitHub Star 徽章 */
        #star-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        #star-badge:hover {
            border-color: var(--warning);
            color: var(--warning);
        }
        
        #star-badge .star-icon {
            color: var(--warning);
            font-size: 14px;
        }
        
        /* Token 统计 */
        #token-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--bg-card);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        
        #token-stats .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #token-stats .stat-value {
            font-weight: 700;
            color: var(--text-primary);
        }
        
        #token-stats .stat-label {
            font-size: 9px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 主场景 -->
        <div id="main-scene">
            <canvas id="scene-canvas"></canvas>
            
            <!-- 顶部状态栏 -->
            <div id="top-bar">
                <div id="logo">
                    <span class="emoji">🦞</span>
                    <span>OpenClaw 像素办公室</span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div id="live-indicator">
                        <div class="dot"></div>
                        <span>LIVE</span>
                    </div>
                    <a id="star-badge" href="https://github.com/cp3d1455926-svg/OpenClaw-good-skills" target="_blank">
                        <span class="star-icon">⭐</span>
                        <span>2 Stars</span>
                    </a>
                    <div id="token-stats">
                        <div class="stat">
                            <span class="stat-value" id="tokens-in">0</span>
                            <span class="stat-label">输入</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="tokens-out">0</span>
                            <span class="stat-label">输出</span>
                        </div>
                    </div>
                    <div id="time-display">00:00:00</div>
                    <div id="status-indicator">
                        <div class="status-dot"></div>
                        <div id="current-status">状态：<span>idle</span></div>
                    </div>
                </div>
            </div>
            
            <!-- 角色状态气泡 -->
            <div id="character-bubble" style="display: none;">
                <span id="bubble-text">待命中...</span>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div id="side-panel">
            <!-- 状态控制 -->
            <div class="panel-section">
                <div class="panel-title">状态控制</div>
                <div class="status-grid">
                    <button class="status-btn active" data-status="idle">
                        <span class="btn-icon">🛋️</span>
                        idle
                    </button>
                    <button class="status-btn" data-status="writing">
                        <span class="btn-icon">💻</span>
                        writing
                    </button>
                    <button class="status-btn" data-status="researching">
                        <span class="btn-icon">🔍</span>
                        researching
                    </button>
                    <button class="status-btn" data-status="executing">
                        <span class="btn-icon">⚙️</span>
                        executing
                    </button>
                    <button class="status-btn" data-status="syncing">
                        <span class="btn-icon">🔄</span>
                        syncing
                    </button>
                    <button class="status-btn" data-status="error">
                        <span class="btn-icon">🐛</span>
                        error
                    </button>
                </div>
            </div>
            
            <!-- 昨日小记 -->
            <div class="panel-section">
                <div class="panel-title">昨日小记</div>
                <div id="memo-content">
                    <div class="loading">
                        <span>加载中</span>
                        <div class="loading-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 技能搜索 + 列表 -->
            <div id="skills-panel">
                <div class="panel-title">活跃技能</div>
                <input type="text" id="skill-search" placeholder="搜索技能...">
                <div id="skills-list"></div>
            </div>
        </div>
        
        <!-- 底部技能墙 -->
        <div id="skill-wall">
            <div id="skill-wall-header">
                <span class="title">📦 技能墙</span>
                <span class="count" id="skill-count">43 个技能</span>
            </div>
            <div id="skill-grid"></div>
        </div>
    </div>
    
    <!-- 遮罩层 -->
    <div id="modal-overlay"></div>
    
    <!-- 技能详情弹窗 -->
    <div id="skill-detail-modal">
        <button class="modal-close" onclick="closeSkillModal()">×</button>
        <div class="modal-header">
            <span class="modal-icon" id="modal-icon">📧</span>
            <span class="modal-title" id="modal-title">邮件助手</span>
        </div>
        <div class="modal-desc" id="modal-desc">
            8 种邮件模板，中英文支持，自动润色
        </div>
        <div class="modal-stats">
            <div class="stat-item">
                <div class="stat-value" id="stat-size">11KB</div>
                <div class="stat-label">代码大小</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-version">v2.0</div>
                <div class="stat-label">版本</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-calls">0</div>
                <div class="stat-label">调用次数</div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = ''; // 如果是后端代理，可以改成 '/api'
        
        // 配置
        const CONFIG = {
            colors: {
                bg: '#0a0a0f',
                lounge: '#1e5a4a',
                desk: '#3a5a8a',
                bug: '#7a3a4a',
                server: '#5a3a6a',
                meeting: '#7a5a3a',
                accent: '#ff4757',
                pixel: 3
            },
            zones: {
                lounge: { x: 0.15, y: 0.5, w: 0.25, h: 0.35, name: '休息区' },
                desk: { x: 0.5, y: 0.35, w: 0.35, h: 0.4, name: '工作区' },

        // 状态

        // Canvas

        // 获取 OpenClaw 状态
        async function fetchOpenClawStatus() {
            console.log('[DEBUG] Fetching OpenClaw status...');
            
            try {
                const response = await fetch('/api/openclaw/status');
                console.log('[DEBUG] Response status:', response.status);
                
                const data = await response.json();
                console.log('[DEBUG] OpenClaw status data:', data);
                
                // 更新 Token 统计
                const tokensInK = (data.tokens_in / 1000).toFixed(1);
                const tokensOutK = (data.tokens_out / 1000).toFixed(1);
                
                console.log('[DEBUG] Updating tokens:', tokensInK, tokensOutK);
                
                const tokensInEl = document.getElementById('tokens-in');
                const tokensOutEl = document.getElementById('tokens-out');
                
                console.log('[DEBUG] Elements found:', !!tokensInEl, !!tokensOutEl);
                
                if (tokensInEl) tokensInEl.textContent = tokensInK + 'k';
                if (tokensOutEl) tokensOutEl.textContent = tokensOutK + 'k';
                
                // 更新模型显示
                if (data.model && data.model !== 'unknown') {
                    console.log('[DEBUG] Model:', data.model);
                }
                
            } catch (error) {
                console.error('[DEBUG] Error fetching status:', error);
                // 使用默认数据
                const tokensInEl = document.getElementById('tokens-in');
                const tokensOutEl = document.getElementById('tokens-out');
                if (tokensInEl) tokensInEl.textContent = '372k';
                if (tokensOutEl) tokensOutEl.textContent = '12k';
            }
        }
        
        // 模拟 Token 更新（演示用）
        function simulateTokenUpdate() {
            setInterval(() => {
                const tokensIn = parseInt(document.getElementById('tokens-in').textContent) || 0;
                const tokensOut = parseInt(document.getElementById('tokens-out').textContent) || 0;
                
                document.getElementById('tokens-in').textContent = (tokensIn + Math.random() * 10).toFixed(1) + 'k';
                document.getElementById('tokens-out').textContent = (tokensOut + Math.random() * 2).toFixed(1) + 'k';
            }, 3000);
        }
        
        // 获取昨日小记
        async function fetchYesterdayMemo() {
            try {
                const response = await fetch('/api/yesterday-memo');
                const data = await response.json();
                
                if (data && data.content) {
                    // 解析并显示
                    document.getElementById('memo-content').innerHTML = parseMemoContent(data.content);
                } else if (data && data.highlights) {
                    let html = '';
                    data.highlights.forEach(h => {
                        html += `<div>${h}</div>`;
                    });
                    document.getElementById('memo-content').innerHTML = html;
                } else {
                    document.getElementById('memo-content').innerHTML = '<em>暂无记忆记录</em>';
                }
            } catch (error) {
                // 使用默认内容
                document.getElementById('memo-content').innerHTML = `
                    <strong>✅ 12 天冲刺计划完成!</strong><br>
                    <ul>
                        <li>优化 6 个核心技能 (v2.0)</li>
                        <li>代码量提升 4.7 倍</li>

                        <li>ClawHub 发布材料就绪</li>
                    </ul>
                    <br>
                    <em>🎉 成就感满满!</em>
                `;
            }
        }
        
        function parseMemoContent(content) {
            // 简单解析 Markdown
            return content
                .split('\n')
                .filter(line => line.trim() && !line.startsWith('#'))
                .map(line => {
                    if (line.includes('✅')) return `<strong>${line}</strong>`;
                    if (line.startsWith('-')) return `<div>• ${line.substring(1)}</div>`;
                    return `<div>${line}</div>`;
                })
                .join('');
        }
        
        // 绘制像素龙虾
        function drawLobster(x, y, frame = 0) {
            const p = CONFIG.colors.pixel;
            ctx.fillStyle = CONFIG.colors.accent;
            
            // 身体动画
            const bounce = Math.sin(frame * 0.15) * 1.5;
            
            // 身体主体
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 8; col++) {
                    const skip = (row === 0 || row === 5) && (col === 0 || col === 7);
                    if (!skip) {
                        ctx.fillRect(
                            Math.floor(x + col * p),
                            Math.floor(y + row * p + bounce),
                            p, p
                        );
                    }
                }
            }
            
            // 钳子（开合动画）
            const clawOpen = Math.sin(frame * 0.25) * 2;
            ctx.fillStyle = '#ff6b7a';
            ctx.fillRect(Math.floor(x + 8 * p), Math.floor(y + 2 * p + bounce - clawOpen), p * 2, p);
            ctx.fillRect(Math.floor(x + 8 * p), Math.floor(y + 4 * p + bounce + clawOpen), p * 2, p);
            
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.fillRect(Math.floor(x + 6 * p), Math.floor(y + 1 * p + bounce), p, p);
            ctx.fillRect(Math.floor(x + 6 * p), Math.floor(y + 5 * p + bounce), p, p);
            
            // 眼珠
            ctx.fillStyle = '#000';
            ctx.fillRect(Math.floor(x + 7 * p), Math.floor(y + 1 * p + bounce), 2, 2);
            ctx.fillRect(Math.floor(x + 7 * p), Math.floor(y + 5 * p + bounce), 2, 2);
        }
        
        // 绘制区域
        function drawZone(key, zone) {
            const x = zone.x * canvas.width;
            const y = zone.y * canvas.height;
            const w = zone.w * canvas.width;
            const h = zone.h * canvas.height;
            
            ctx.fillStyle = CONFIG.colors[key] + '20';
            ctx.fillRect(x, y, w, h);
            
            ctx.strokeStyle = CONFIG.colors[key];
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(zone.name, x + w / 2, y + h / 2);
        }
        
        // 绘制场景
        function drawScene() {
            ctx.fillStyle = CONFIG.colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(45, 45, 58, 0.5)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            Object.entries(CONFIG.zones).forEach(([key, zone]) => {
                drawZone(key, zone);
            });
            
            drawLobster(lobster.x, lobster.y, lobster.frame);
            lobster.frame++;
            
            requestAnimationFrame(drawScene);
        }
        
        // 更新龙虾位置
        function updateLobsterPosition() {
            const zone = CONFIG.zones[STATES[currentState].zone];
            lobster.targetX = zone.x * canvas.width + zone.w * canvas.width / 2 - 16;
            lobster.targetY = zone.y * canvas.height + zone.h * canvas.height / 2 - 12;
        }
        
        // 平滑移动龙虾
        function animateLobster() {
            const dx = lobster.targetX - lobster.x;
            const dy = lobster.targetY - lobster.y;
            
            if (Math.abs(dx) > 2) lobster.x += dx * 0.05;
            if (Math.abs(dy) > 2) lobster.y += dy * 0.05;
            
            const bubble = document.getElementById('character-bubble');
            bubble.style.left = (lobster.x + 20) + 'px';
            bubble.style.top = (lobster.y - 40) + 'px';
            
            requestAnimationFrame(animateLobster);
        }
        
        // 切换状态
        function setState(status) {
            currentState = status;
            const config = STATES[status];
            
            document.querySelector('#current-status span').textContent = status;
            document.querySelector('#bubble-text').textContent = config.text;
            document.getElementById('character-bubble').style.display = 'block';
            document.getElementById('character-bubble').style.borderColor = config.color;
            
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            
            updateLobsterPosition();
            
            // 调用 API 更新状态
            fetch('/api/set_state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status, text: config.text })
            }).catch(console.error);
        }
        
        // 渲染技能列表
        function renderSkills(filter = '') {
            const filteredSkills = SKILLS.filter(skill => 
                skill.name.toLowerCase().includes(filter.toLowerCase()) ||
                skill.desc.toLowerCase().includes(filter.toLowerCase())
            );
            
            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = filteredSkills.slice(0, 8).map(skill => `
                <div class="skill-item" onclick="showSkillDetail('${skill.name}')">
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-info">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.desc}</div>
                    </div>
                    <div class="skill-status"></div>
                </div>
            `).join('');
            
            const skillGrid = document.getElementById('skill-grid');
            skillGrid.innerHTML = filteredSkills.map(skill => `
                <div class="skill-card" onclick="showSkillDetail('${skill.name}')" title="${skill.desc}">
                    <div class="icon">${skill.icon}</div>
                    <div class="name">${skill.name}</div>
                    <div class="status-dot"></div>
                </div>
            `).join('');
            
            document.getElementById('skill-count').textContent = `${filteredSkills.length} 个技能`;
        }
        
        // 显示技能详情
        function showSkillDetail(skillName) {
            const skill = SKILLS.find(s => s.name === skillName);
            if (!skill) return;
            
            document.getElementById('modal-icon').textContent = skill.icon;
            document.getElementById('modal-title').textContent = skill.name;
            document.getElementById('modal-desc').textContent = skill.desc;
            document.getElementById('stat-size').textContent = skill.size;
            document.getElementById('stat-version').textContent = skill.version;
            document.getElementById('stat-calls').textContent = skill.calls;
            
            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById('skill-detail-modal').classList.add('active');
        }
        
        // 关闭技能详情
        function closeSkillModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('skill-detail-modal').classList.remove('active');
        }
