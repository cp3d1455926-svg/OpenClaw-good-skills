<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 OpenClaw 像素办公室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pixel-office">
    <!-- 顶部标题栏 -->
    <header class="office-header">
      <h1>🦞 OpenClaw 像素办公室</h1>
      <p class="subtitle">技能可视化展示中心</p>
    </header>

    <!-- 主办公室场景 -->
    <main class="office-scene">
      <!-- 左侧：龙虾工作站 -->
      <section class="lobster-station">
        <div class="pixel-lobster" id="lobster">
          <pre class="ascii-art">
    🦞
   ╱|
  | |
  | |
  |/
          </pre>
          <div class="lobster-name">像素龙虾</div>
        </div>
        
        <div class="computer-desk">
          <div class="monitor">
            <div class="screen">
              <div class="screen-content" id="screen-display">
                <span class="blink">_</span>
              </div>
            </div>
            <div class="monitor-stand"></div>
          </div>
          <div class="keyboard"></div>
        </div>
      </section>

      <!-- 中间：技能展示区 -->
      <section class="skills-display">
        <h2 class="section-title">📚 技能库</h2>
        
        <!-- 4 个 v2.0 技能 -->
        <div class="skill-shelf shelf-v2">
          <h3>⭐ v2.0 优化技能</h3>
          <div class="skill-items">
            <div class="skill-item" data-skill="travel-planner">
              <div class="skill-icon">✈️</div>
              <div class="skill-name">旅行规划</div>
              <div class="skill-version v2">v2.0</div>
            </div>
            <div class="skill-item" data-skill="habit-tracker">
              <div class="skill-icon">🎯</div>
              <div class="skill-name">习惯养成</div>
              <div class="skill-version v2">v2.0</div>
            </div>
            <div class="skill-item" data-skill="goal-manager">
              <div class="skill-icon">🎯</div>
              <div class="skill-name">目标管理</div>
              <div class="skill-version v2">v2.0</div>
            </div>
            <div class="skill-item" data-skill="expense-tracker">
              <div class="skill-icon">💰</div>
              <div class="skill-name">记账助手</div>
              <div class="skill-version v2">v2.0</div>
            </div>
          </div>
        </div>

        <!-- 其他技能 -->
        <div class="skill-shelf">
          <h3>📦 其他技能</h3>
          <div class="skill-items" id="other-skills">
            <!-- 由 JS 动态加载 -->
          </div>
        </div>
      </section>

      <!-- 右侧：状态看板 -->
      <section class="status-board">
        <h2 class="section-title">📊 实时状态</h2>
        
        <div class="status-card">
          <h3>🔥 今日打卡</h3>
          <div class="status-value" id="today-checkins">0</div>
        </div>
        
        <div class="status-card">
          <h3>🎯 目标进度</h3>
          <div class="progress-bar">
            <div class="progress-fill" id="goal-progress" style="width: 0%"></div>
          </div>
          <div class="status-value" id="goal-percent">0%</div>
        </div>
        
        <div class="status-card">
          <h3>💰 本月支出</h3>
          <div class="status-value" id="month-expense">¥0</div>
        </div>
        
        <div class="status-card">
          <h3>📚 技能总数</h3>
          <div class="status-value" id="total-skills">43</div>
        </div>
      </section>
    </main>

    <!-- 底部：文件柜 -->
    <footer class="file-cabinet">
      <div class="cabinet-drawer" data-category="life">
        <span class="drawer-icon">🗂️</span>
        <span class="drawer-label">生活类</span>
      </div>
      <div class="cabinet-drawer" data-category="work">
        <span class="drawer-icon">💼</span>
        <span class="drawer-label">工作类</span>
      </div>
      <div class="cabinet-drawer" data-category="learn">
        <span class="drawer-icon">📖</span>
        <span class="drawer-label">学习类</span>
      </div>
      <div class="cabinet-drawer" data-category="health">
        <span class="drawer-icon">💪</span>
        <span class="drawer-label">健康类</span>
      </div>
    </footer>

    <!-- 技能详情弹窗 -->
    <div class="skill-modal" id="skill-modal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-header">
          <span class="modal-icon" id="modal-icon">✈️</span>
          <h2 id="modal-title">技能名称</h2>
          <span class="modal-version" id="modal-version">v2.0</span>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
